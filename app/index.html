<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On the Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/grid.css">
<link rel="stylesheet" href="styles/components.css">
<!-- Supabase UMD build — plain global script, not a module, so this
     keeps working when the file is opened directly (file://). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== Header nav ===== -->
<!-- Wired to Supabase — real people/groups/memberships, no more mock
     data. This is the first of three components (header, body
     container, footer) building up on the frame. -->
<header class="site-header">
  <div class="container">
    <div class="row">
      <div class="col-half">
        <a href="index.html" class="wordmark">On the Radar</a>
      </div>
      <div class="col-half header-controls" style="justify-content: flex-end;">

        <div class="group-switch-wrap">
          <button class="group-switch" id="group-switch-btn">Loading…</button>
          <div class="group-menu" id="group-menu"></div>
        </div>

        <div class="avatar-stack">
          <div class="avatar-dots" id="avatar-dots"></div>
          <div class="avatar-list" id="avatar-list"></div>
        </div>

      </div>
    </div>
  </div>
</header>

<!-- ===== Body container ===== -->
<!-- Show cards for the current group's shows — real data, wired to
     Supabase. Curious/going/out buttons write to the responses table
     immediately on click. Overlap count only counts curious + going. -->
<main class="container show-list">
  <div id="show-list-content" class="show-list-empty">Loading…</div>
</main>

<!-- ===== Footer — next up ===== -->

<!-- Plain scripts, not modules — see supabase/client.js for why.
     Load order matters: client.js defines OTR.db before identity.js
     and shows.js use it. -->
<script src="supabase/client.js"></script>
<script src="scripts/identity.js"></script>
<script src="scripts/shows.js"></script>
<script>
  const { getOrCreatePerson, getMyGroups, getGroupMembers, createGroup } = OTR;
  const { getShowsForGroup, getResponsesForShows, overlapCount, setResponse } = OTR;

  const switchBtn = document.getElementById('group-switch-btn');
  const groupMenu = document.getElementById('group-menu');
  const avatarDots = document.getElementById('avatar-dots');
  const avatarList = document.getElementById('avatar-list');

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function renderGroupMenu(groups, currentGroup) {
    groupMenu.innerHTML = '';
    groups.forEach(g => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = g.name;
      btn.addEventListener('click', () => selectGroup(g));
      groupMenu.appendChild(btn);
    });
    const newBtn = document.createElement('button');
    newBtn.type = 'button';
    newBtn.textContent = '+ New group';
    newBtn.addEventListener('click', handleNewGroup);
    groupMenu.appendChild(newBtn);
  }

  async function renderAvatars(groupId) {
    const members = await getGroupMembers(groupId);
    avatarDots.innerHTML = '';
    avatarList.innerHTML = '';
    members.forEach(p => {
      const dot = document.createElement('div');
      dot.className = 'avatar-dot';
      dot.textContent = initials(p.display_name);
      avatarDots.appendChild(dot);

      const item = document.createElement('div');
      item.textContent = p.display_name;
      avatarList.appendChild(item);
    });
  }

  async function selectGroup(group) {
    switchBtn.textContent = `${group.name} ▾`;
    groupMenu.classList.remove('open');
    await renderAvatars(group.id);
    await renderShowList(group.id);
  }

  let person = null;

  function formatDate(dateStr, timeStr) {
    const d = new Date(`${dateStr}T${timeStr || '00:00'}`);
    const date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
    if (!timeStr) return date;
    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    return `${date} · ${time}`;
  }

  async function renderShowList(groupId) {
    const content = document.getElementById('show-list-content');
    content.textContent = 'Loading…';

    const shows = await getShowsForGroup(groupId);

    if (shows.length === 0) {
      content.className = 'show-list-empty';
      content.textContent = 'No shows yet.';
      return;
    }

    const showIds = shows.map((s) => s.id);
    const responsesByShow = await getResponsesForShows(showIds);

    content.className = '';
    content.innerHTML = '';

    shows.forEach((show) => {
      const responses = responsesByShow[show.id] || [];
      const mine = responses.find((r) => r.person_id === person.id);
      const overlap = overlapCount(responses);

      const card = document.createElement('div');
      card.className = 'show-card';

      const main = document.createElement('div');
      main.className = 'show-card-main';
      main.innerHTML = `
        <div class="show-date">${formatDate(show.show_date, show.show_time)}</div>
        <div class="show-title">${show.title}</div>
        ${show.venue_name ? `<div class="show-venue">${show.venue_url ? `<a href="${show.venue_url}" target="_blank" rel="noopener">${show.venue_name}</a>` : show.venue_name}</div>` : ''}
        ${show.openers ? `<div class="show-openers">with ${show.openers}</div>` : ''}
      `;
      card.appendChild(main);

      const side = document.createElement('div');
      side.style.display = 'flex';
      side.style.flexDirection = 'column';
      side.style.alignItems = 'flex-end';
      side.style.gap = 'var(--space-8)';

      if (overlap >= 2) {
        const badge = document.createElement('div');
        badge.className = 'show-overlap';
        badge.textContent = `${overlap} overlap`;
        side.appendChild(badge);
      }

      const responseRow = document.createElement('div');
      responseRow.className = 'show-responses';

      [['curious', 'Curious'], ['going', 'Got tickets'], ['out', "I'm out"]].forEach(([status, label]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'resp-btn';
        btn.dataset.status = status;
        btn.textContent = label;
        if (mine && mine.status === status) btn.classList.add('active');
        btn.addEventListener('click', async () => {
          const ok = await setResponse(show.id, person.id, status);
          if (ok) await renderShowList(groupId);
        });
        responseRow.appendChild(btn);
      });

      side.appendChild(responseRow);
      card.appendChild(side);
      content.appendChild(card);
    });
  }

  async function handleNewGroup() {
    groupMenu.classList.remove('open');
    const name = window.prompt('Name this group:', '')?.trim();
    if (!name) return;
    const group = await createGroup(person.id, name);
    if (!group) return;
    const groups = await getMyGroups(person.id);
    renderGroupMenu(groups, group);
    await selectGroup(group);
  }

  async function init() {
    person = await getOrCreatePerson();
    if (!person) {
      switchBtn.textContent = 'Connection error';
      return;
    }

    const groups = await getMyGroups(person.id);

    if (groups.length === 0) {
      switchBtn.textContent = 'No groups yet ▾';
      renderGroupMenu([], null);
      document.getElementById('show-list-content').textContent = 'Create a group to start adding shows.';
      return;
    }

    renderGroupMenu(groups, groups[0]);
    await selectGroup(groups[0]);
  }

  init();

  // Menu toggling
  switchBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    groupMenu.classList.toggle('open');
  });
  avatarDots.addEventListener('click', (e) => {
    e.stopPropagation();
    avatarList.classList.toggle('open');
  });
  document.addEventListener('click', () => {
    groupMenu.classList.remove('open');
    avatarList.classList.remove('open');
  });
</script>

</body>
</html>
