<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>On the Radar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/grid.css">
<link rel="stylesheet" href="styles/components.css">
<!-- Supabase UMD build — plain global script, not a module, so this
     keeps working when the file is opened directly (file://). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== Header nav ===== -->
<!-- Wired to Supabase — real people/groups/memberships, no more mock
     data. This is the first of three components (header, body
     container, footer) building up on the frame. -->
<header class="site-header">
  <div class="container">
    <div class="row">
      <div class="col-half">
        <a href="index.html" class="wordmark">On the Radar</a>
      </div>
      <div class="col-half header-controls" style="justify-content: flex-end;">

        <div class="group-switch-wrap">
          <button class="group-switch" id="group-switch-btn">Loading…</button>
          <div class="group-menu" id="group-menu"></div>
        </div>

        <div class="avatar-stack">
          <div class="avatar-dots" id="avatar-dots"></div>
          <div class="avatar-list" id="avatar-list"></div>
        </div>

      </div>
    </div>
  </div>
</header>

<!-- ===== Body container ===== -->
<!-- Show cards for the current group's shows — real data, wired to
     Supabase. Curious/going/out buttons write to the responses table
     immediately on click. Overlap count only counts curious + going. -->
<main class="container show-list">
  <div class="show-list-header">
    <button type="button" id="add-show-btn" class="btn-solid" style="display:none;">+ Add show</button>
  </div>

  <div id="add-show-panel" class="add-show-form" style="display:none;">

    <!-- Method 1: search by artist name (Ticketmaster, New England) -->
    <div class="form-row" id="search-method-row">
      <label for="artist-search-input">Search artist</label>
      <div class="inline-input-row">
        <input type="text" id="artist-search-input" placeholder="Artist or show name">
        <button type="button" id="artist-search-btn" class="btn-solid">Search</button>
      </div>
      <div id="artist-search-status" class="autofill-status"></div>
      <div id="artist-search-results" class="search-results" style="display:none;"></div>
    </div>

    <div class="add-show-alt-methods">
      <button type="button" id="show-link-method-btn" class="link-btn">or paste a link</button>
      <button type="button" id="show-manual-method-btn" class="link-btn">or add manually</button>
    </div>

    <!-- Method 2: paste a link, autofill via server-side scrape -->
    <div class="form-row" id="link-method-row" style="display:none;">
      <label for="show-link-input">Show link</label>
      <div class="inline-input-row">
        <input type="url" id="show-link-input" placeholder="https://…">
        <button type="button" id="link-autofill-btn" class="btn-solid">Autofill</button>
      </div>
      <div id="link-autofill-status" class="autofill-status"></div>
    </div>

    <!-- Method 3: manual fields — also the fallback when search/link
         autofill doesn't return a usable title+date. When it does,
         the show gets created straight from that data with no form
         shown at all (see submitShowDirectly in the script below). -->
    <form id="add-show-form" style="display:none;">
      <div class="form-row">
        <label for="show-title">Show</label>
        <input type="text" id="show-title" required placeholder="Artist / show title">
      </div>
      <div class="form-row">
        <label for="show-date-input">Date</label>
        <input type="date" id="show-date-input" required>
      </div>
      <div class="form-row">
        <label for="show-venue-name">Venue</label>
        <input type="text" id="show-venue-name" placeholder="Venue name" autocomplete="off">
        <div id="venue-search-results" class="search-results" style="display:none;"></div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn-solid">Add show</button>
        <button type="button" id="cancel-add-show" class="btn-outline">Cancel</button>
      </div>
    </form>

  </div>

  <div id="show-list-content" class="show-list-empty">Loading…</div>
</main>

<!-- ===== Footer — next up ===== -->

<!-- Plain scripts, not modules — see supabase/client.js for why.
     Load order matters: client.js defines OTR.db before identity.js
     and shows.js use it. -->
<script src="supabase/client.js"></script>
<script src="scripts/identity.js"></script>
<script src="scripts/shows.js"></script>
<script>
  const { getOrCreatePerson, getMyGroups, getGroupMembers, createGroup } = OTR;
  const { getShowsForGroup, getResponsesForShows, overlapCount, setResponse, createShow, parseShowLink, searchShows, searchVenues } = OTR;

  const switchBtn = document.getElementById('group-switch-btn');
  const groupMenu = document.getElementById('group-menu');
  const avatarDots = document.getElementById('avatar-dots');
  const avatarList = document.getElementById('avatar-list');
  const addShowBtn = document.getElementById('add-show-btn');
  const addShowPanel = document.getElementById('add-show-panel');
  const addShowForm = document.getElementById('add-show-form');
  const cancelAddShow = document.getElementById('cancel-add-show');

  const artistSearchInput = document.getElementById('artist-search-input');
  const artistSearchBtn = document.getElementById('artist-search-btn');
  const artistSearchStatus = document.getElementById('artist-search-status');
  const artistSearchResults = document.getElementById('artist-search-results');

  const showLinkMethodBtn = document.getElementById('show-link-method-btn');
  const showManualMethodBtn = document.getElementById('show-manual-method-btn');
  const linkMethodRow = document.getElementById('link-method-row');
  const showLinkInput = document.getElementById('show-link-input');
  const linkAutofillBtn = document.getElementById('link-autofill-btn');
  const linkAutofillStatus = document.getElementById('link-autofill-status');

  const venueNameInput = document.getElementById('show-venue-name');
  const venueSearchResults = document.getElementById('venue-search-results');

  let currentGroupId = null;
  let selectedVenueUrl = null;
  let venueSearchTimer = null;

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  // Self-contained avatar stack: dots that expand to a plain name list.
  // Used in the header (whole crew) and on each show card (who's in).
  // Each instance manages its own open/closed state via closure, so
  // multiple stacks on the page don't collide.
  function buildAvatarStack(people) {
    const wrap = document.createElement('div');
    wrap.className = 'avatar-stack';

    const dots = document.createElement('div');
    dots.className = 'avatar-dots';
    const list = document.createElement('div');
    list.className = 'avatar-list';

    people.forEach((p) => {
      const dot = document.createElement('div');
      dot.className = 'avatar-dot';
      dot.textContent = initials(p.display_name);
      dots.appendChild(dot);

      const item = document.createElement('div');
      item.textContent = p.display_name;
      list.appendChild(item);
    });

    dots.addEventListener('click', (e) => {
      e.stopPropagation();
      list.classList.toggle('open');
    });

    wrap.appendChild(dots);
    wrap.appendChild(list);
    return wrap;
  }

  function renderGroupMenu(groups, currentGroup) {
    groupMenu.innerHTML = '';
    groups.forEach(g => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = g.name;
      btn.addEventListener('click', () => selectGroup(g));
      groupMenu.appendChild(btn);
    });
    const newBtn = document.createElement('button');
    newBtn.type = 'button';
    newBtn.textContent = '+ New group';
    newBtn.addEventListener('click', handleNewGroup);
    groupMenu.appendChild(newBtn);
  }

  async function renderAvatars(groupId) {
    const members = await getGroupMembers(groupId);
    avatarDots.innerHTML = '';
    avatarList.innerHTML = '';
    members.forEach(p => {
      const dot = document.createElement('div');
      dot.className = 'avatar-dot';
      dot.textContent = initials(p.display_name);
      avatarDots.appendChild(dot);

      const item = document.createElement('div');
      item.textContent = p.display_name;
      avatarList.appendChild(item);
    });
  }

  async function selectGroup(group) {
    switchBtn.textContent = `${group.name} ▾`;
    groupMenu.classList.remove('open');
    currentGroupId = group.id;
    addShowBtn.style.display = 'inline-block';
    await renderAvatars(group.id);
    await renderShowList(group.id);
  }

  let person = null;

  function formatDate(dateStr, timeStr) {
    const d = new Date(`${dateStr}T${timeStr || '00:00'}`);
    const date = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
    if (!timeStr) return date;
    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    return `${date} · ${time}`;
  }

  async function renderShowList(groupId) {
    const content = document.getElementById('show-list-content');
    content.textContent = 'Loading…';

    const shows = await getShowsForGroup(groupId);

    if (shows.length === 0) {
      content.className = 'show-list-empty';
      content.textContent = 'No shows yet.';
      return;
    }

    const showIds = shows.map((s) => s.id);
    const responsesByShow = await getResponsesForShows(showIds);

    content.className = '';
    content.innerHTML = '';

    shows.forEach((show) => {
      const responses = responsesByShow[show.id] || [];
      const mine = responses.find((r) => r.person_id === person.id);
      const overlap = overlapCount(responses);
      const interested = responses.filter((r) => r.status === 'curious' || r.status === 'going');

      const card = document.createElement('div');
      card.className = 'show-card';
      if (mine && mine.status === 'out') card.classList.add('is-out');

      const top = document.createElement('div');
      top.className = 'show-card-top';
      const dateEl = document.createElement('div');
      dateEl.className = 'show-date';
      dateEl.textContent = formatDate(show.show_date, show.show_time);
      top.appendChild(dateEl);
      if (overlap >= 2) {
        const badge = document.createElement('div');
        badge.className = 'show-overlap';
        badge.textContent = `${overlap} overlap`;
        top.appendChild(badge);
      }
      card.appendChild(top);

      const body = document.createElement('div');
      body.innerHTML = `
        <div class="show-title">${show.title}</div>
        ${show.venue_name ? `<div class="show-venue">${show.venue_url ? `<a href="${show.venue_url}" target="_blank" rel="noopener">${show.venue_name}</a>` : show.venue_name}</div>` : ''}
        ${show.openers ? `<div class="show-openers">with ${show.openers}</div>` : ''}
      `;
      card.appendChild(body);

      if (interested.length > 0) {
        const avatarRow = document.createElement('div');
        avatarRow.className = 'show-card-avatars';
        avatarRow.appendChild(buildAvatarStack(interested.map((r) => r.people)));
        card.appendChild(avatarRow);
      }

      const responseRow = document.createElement('div');
      responseRow.className = 'show-responses';

      [['curious', 'Curious'], ['going', 'Got tickets'], ['out', "I'm out"]].forEach(([status, label]) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'resp-btn';
        btn.dataset.status = status;
        btn.textContent = label;
        if (mine && mine.status === status) btn.classList.add('active');
        btn.addEventListener('click', async () => {
          const ok = await setResponse(show.id, person.id, status);
          if (ok) await renderShowList(groupId);
        });
        responseRow.appendChild(btn);
      });

      card.appendChild(responseRow);
      content.appendChild(card);
    });
  }

  async function handleNewGroup() {
    groupMenu.classList.remove('open');
    const name = window.prompt('Name this group:', '')?.trim();
    if (!name) return;
    const group = await createGroup(person.id, name);
    if (!group) return;
    const groups = await getMyGroups(person.id);
    renderGroupMenu(groups, group);
    await selectGroup(group);
  }

  async function init() {
    person = await getOrCreatePerson();
    if (!person) {
      switchBtn.textContent = 'Connection error';
      return;
    }

    const groups = await getMyGroups(person.id);

    if (groups.length === 0) {
      switchBtn.textContent = 'No groups yet ▾';
      renderGroupMenu([], null);
      document.getElementById('show-list-content').textContent = 'Create a group to start adding shows.';
      return;
    }

    renderGroupMenu(groups, groups[0]);
    await selectGroup(groups[0]);
  }

  init();

  // Menu toggling
  switchBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    groupMenu.classList.toggle('open');
  });
  avatarDots.addEventListener('click', (e) => {
    e.stopPropagation();
    avatarList.classList.toggle('open');
  });
  // Closes every open menu/avatar-list on the page, not just the
  // header's — show cards each have their own avatar stack now.
  document.addEventListener('click', () => {
    groupMenu.classList.remove('open');
    document.querySelectorAll('.avatar-list.open').forEach((el) => el.classList.remove('open'));
  });

  // ===== Add show: three entry methods (search, link, manual), all
  // funneling into the same manual form for review before submit. =====

  function resetAddShowPanel() {
    addShowForm.reset();
    addShowForm.style.display = 'none';

    artistSearchInput.value = '';
    artistSearchStatus.textContent = '';
    artistSearchResults.innerHTML = '';
    artistSearchResults.style.display = 'none';

    showLinkInput.value = '';
    linkAutofillStatus.textContent = '';
    linkMethodRow.style.display = 'none';

    venueSearchResults.innerHTML = '';
    venueSearchResults.style.display = 'none';
    selectedVenueUrl = null;

    document.getElementById('search-method-row').style.display = 'block';

    addShowPanel.style.display = 'none';
    addShowBtn.style.display = 'inline-block';
  }

  function revealManualForm(prefill) {
    document.getElementById('show-title').value = prefill?.title || '';
    document.getElementById('show-date-input').value = prefill?.show_date || '';
    venueNameInput.value = prefill?.venue_name || '';
    selectedVenueUrl = prefill?.venue_url || null;
    addShowForm.style.display = 'block';
    addShowForm.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Used when search or link autofill already has enough to create the
  // show outright (title + date) — no review form, just add it. Falls
  // back to the form if the data turns out to be incomplete.
  async function submitShowDirectly(fields) {
    if (!currentGroupId) return;
    if (!fields.title || !fields.show_date) {
      revealManualForm(fields);
      return;
    }
    const show = await createShow(currentGroupId, person.id, fields);
    if (show) {
      resetAddShowPanel();
      await renderShowList(currentGroupId);
    }
  }

  addShowBtn.addEventListener('click', () => {
    addShowPanel.style.display = 'block';
    addShowBtn.style.display = 'none';
  });

  cancelAddShow.addEventListener('click', resetAddShowPanel);

  // Method switching
  showLinkMethodBtn.addEventListener('click', () => {
    document.getElementById('search-method-row').style.display = 'none';
    linkMethodRow.style.display = 'block';
  });

  showManualMethodBtn.addEventListener('click', () => {
    revealManualForm(null);
  });

  // Method 1: artist search (Ticketmaster, New England)
  artistSearchBtn.addEventListener('click', async () => {
    const keyword = artistSearchInput.value.trim();
    if (!keyword) return;

    artistSearchStatus.textContent = 'Searching…';
    artistSearchResults.style.display = 'none';
    artistSearchResults.innerHTML = '';

    const results = await searchShows(keyword);

    if (results.length === 0) {
      artistSearchStatus.textContent = 'No shows found — try a link or add manually.';
      return;
    }

    artistSearchStatus.textContent = `${results.length} show${results.length === 1 ? '' : 's'} found`;
    artistSearchResults.style.display = 'block';

    results.forEach((show) => {
      const item = document.createElement('button');
      item.type = 'button';
      item.className = 'search-result-item';
      item.innerHTML = `
        <div class="result-title">${show.title || 'Untitled show'}</div>
        <div class="result-meta">${show.show_date || 'No date'}${show.venue_name ? ' · ' + show.venue_name : ''}</div>
      `;
      item.addEventListener('click', () => submitShowDirectly(show));
      artistSearchResults.appendChild(item);
    });
  });

  // Method 2: paste a link, autofill via server-side scrape. A usable
  // result (title + date) gets added straight away; anything less
  // falls back to the manual form with whatever was found pre-filled.
  linkAutofillBtn.addEventListener('click', async () => {
    const url = showLinkInput.value.trim();
    if (!url) return;

    linkAutofillStatus.textContent = 'Reading link…';
    const result = await parseShowLink(url);
    const fields = { ...result, venue_url: result.venue_url || url };

    if (fields.title && fields.show_date) {
      await submitShowDirectly(fields);
    } else {
      linkAutofillStatus.textContent = "Couldn't read that link — add the details manually below.";
      revealManualForm(fields);
    }
  });

  // Venue-name autocomplete — debounced lookup against Ticketmaster's
  // venue directory. Picking a suggestion silently attaches its venue
  // link; there's no visible link field for it to appear in.
  venueNameInput.addEventListener('input', () => {
    selectedVenueUrl = null;
    clearTimeout(venueSearchTimer);

    const keyword = venueNameInput.value.trim();
    if (keyword.length < 3) {
      venueSearchResults.style.display = 'none';
      venueSearchResults.innerHTML = '';
      return;
    }

    venueSearchTimer = setTimeout(async () => {
      const venues = await searchVenues(keyword);
      venueSearchResults.innerHTML = '';

      if (venues.length === 0) {
        venueSearchResults.style.display = 'none';
        return;
      }

      venues.forEach((v) => {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'search-result-item';
        item.innerHTML = `
          <div class="result-title">${v.name}</div>
          ${v.city ? `<div class="result-meta">${v.city}</div>` : ''}
        `;
        item.addEventListener('click', () => {
          venueNameInput.value = v.name;
          selectedVenueUrl = v.url;
          venueSearchResults.style.display = 'none';
          venueSearchResults.innerHTML = '';
        });
        venueSearchResults.appendChild(item);
      });

      venueSearchResults.style.display = 'block';
    }, 300);
  });

  // Method 3: manual submit — used for plain manual entry, and as the
  // fallback when search/link autofill didn't have enough to add the
  // show outright.
  addShowForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fields = {
      title: document.getElementById('show-title').value.trim(),
      show_date: document.getElementById('show-date-input').value,
      venue_name: venueNameInput.value.trim(),
      venue_url: selectedVenueUrl,
    };
    await submitShowDirectly(fields);
  });
</script>

</body>
</html>
